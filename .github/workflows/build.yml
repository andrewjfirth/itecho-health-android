name: Build signed AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Generate upload keystore
        run: |
          KEYSTORE_PASS=$(cat /proc/sys/kernel/random/uuid | tr -d '-' | head -c 24)
          echo "KEYSTORE_PASS=$KEYSTORE_PASS" >> $GITHUB_ENV
          keytool -genkeypair \
            -alias upload \
            -keyalg RSA \
            -keysize 2048 \
            -validity 9125 \
            -keystore $RUNNER_TEMP/upload.keystore \
            -storepass "$KEYSTORE_PASS" \
            -keypass "$KEYSTORE_PASS" \
            -dname "CN=iTECHO Health,OU=Android,O=iTECHO,L=Unknown,S=Unknown,C=US"
          echo "$KEYSTORE_PASS" > $RUNNER_TEMP/keystore-password.txt
          echo "Keystore alias: upload" >> $RUNNER_TEMP/keystore-password.txt

      - name: Build release AAB
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/upload.keystore
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASS }}
          KEY_ALIAS: upload
          KEY_PASSWORD: ${{ env.KEYSTORE_PASS }}
        run: gradle bundleRelease

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: itecho-health-release
          path: |
            app/build/outputs/bundle/release/app-release.aab
            ${{ runner.temp }}/upload.keystore
            ${{ runner.temp }}/keystore-password.txt
          retention-days: 30
